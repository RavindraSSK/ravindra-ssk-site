<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none" role="img" aria-label="Animated handball fast break illustration">
  <defs>
    <linearGradient id="hb-bg" x1="0" y1="0" x2="800" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0F1A3A"/>
      <stop offset="1" stop-color="#1E3A8A"/>
    </linearGradient>
  </defs>
  <style>
    .fb-path {
      stroke-dasharray: 10 12;
      animation: fb-dash 2.4s linear infinite;
    }
    .fb-ball {
      transform-box: fill-box;
      transform-origin: center;
      animation: fb-bob 1.6s ease-in-out infinite;
    }
    @keyframes fb-dash {
      to { stroke-dashoffset: -220; }
    }
    @keyframes fb-bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-7px); }
    }
    @media (prefers-reduced-motion: reduce) {
      .fb-path { animation: none; }
      .fb-ball { animation: none; }
    }
  </style>
  <rect width="800" height="500" rx="24" fill="url(#hb-bg)"/>
  <path class="fb-path" d="M80 380 Q200 120 420 200 T720 160" stroke="rgba(147,180,245,0.4)" stroke-width="4" fill="none"/>
  <g class="fb-ball">
    <circle cx="180" cy="300" r="28" fill="#3B82F6"/>
    <circle cx="180" cy="300" r="14" fill="#93C5FD"/>
  </g>
  <circle cx="420" cy="220" r="22" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="420" cy="220" r="10" fill="#1B2D5F"/>
  <circle cx="620" cy="180" r="22" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="620" cy="180" r="10" fill="#1B2D5F"/>
  <rect x="640" y="120" width="100" height="140" rx="6" fill="rgba(59,130,246,0.2)" stroke="#93B4F5" stroke-width="3"/>
  <circle cx="120" cy="340" r="36" fill="rgba(255,255,255,0.12)" stroke="#FFFFFF" stroke-width="3"/>
  <text x="120" y="348" text-anchor="middle" fill="#FFFFFF" font-family="system-ui,sans-serif" font-size="22" font-weight="800">7</text>
  <text x="400" y="440" text-anchor="middle" fill="#DBEAFE" font-family="system-ui,sans-serif" font-size="20" font-weight="600">Fast break — speed and decision-making</text>
</svg>
